<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>InFovea</title>

    <meta
        name="description"
        content="InFovea — Governed Cognitive Infrastructure for professionally accountable decision-making."
    >

    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            overflow: hidden;
            background:
                radial-gradient(
                    circle at 50% 34%,
                    rgba(255, 255, 255, 0.045),
                    transparent 35%
                ),
                radial-gradient(
                    circle at 42% 38%,
                    rgba(51, 145, 205, 0.035),
                    transparent 28%
                ),
                radial-gradient(
                    circle at 58% 42%,
                    rgba(93, 201, 92, 0.025),
                    transparent 30%
                ),
                #050505;
            color: #f5f5f5;
            font-family:
                Inter,
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Helvetica,
                Arial,
                sans-serif;
        }

        main {
            width: 100%;
            max-width: 920px;
            text-align: center;
        }

        .logo {
            width: clamp(84px, 10vw, 120px);
            height: auto;
            margin: 0 auto 34px;
            display: block;
            filter:
                drop-shadow(0 0 22px rgba(255, 255, 255, 0.045));
        }

        h1 {
            margin: 0;
            font-size: clamp(3.3rem, 9vw, 6.8rem);
            line-height: 0.95;
            font-weight: 650;
            letter-spacing: -0.065em;
        }

        .category {
            margin: 30px 0 0;
            font-size: clamp(1rem, 2.2vw, 1.35rem);
            line-height: 1.5;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #d7d7d7;
        }

        .statement {
            max-width: 720px;
            margin: 28px auto 0;
            font-size: clamp(1.25rem, 3vw, 2rem);
            line-height: 1.45;
            font-weight: 300;
            color: #aaa;
        }

        .status {
            margin: 52px 0 0;
            font-size: 0.84rem;
            line-height: 1.6;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #676767;
        }

        footer {
            margin-top: 74px;
            font-size: 0.8rem;
            color: #505050;
        }

        @media (max-width: 560px) {
            body {
                padding: 32px 20px;
                overflow: auto;
            }

            .logo {
                margin-bottom: 28px;
            }

            .category {
                letter-spacing: 0.1em;
            }

            .status {
                margin-top: 42px;
            }

            footer {
                margin-top: 58px;
            }
        }
    </style>
</head>

<body>
    <main>
        <img
            src="InFovea%20Logo%20Symbol%20Transparent%20bg.svg"
            alt="InFovea logo"
            class="logo"
        >

        <h1>InFovea</h1>

        <p class="category">
            Governed Cognitive Infrastructure
        </p>

        <p class="statement">
            Improving the quality of professionally accountable decisions.
        </p>

        <p class="status">
            Our website is currently being updated.
        </p>

        <footer>
            &copy; 2026 InFovea. All rights reserved.
        </footer>
    </main>
</body>
</html>

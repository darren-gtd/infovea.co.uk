<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>InFovea</title>

    <meta
        name="description"
        content="InFovea — Governed Cognitive Infrastructure for professionally accountable decision-making."
    >

    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            background:
                radial-gradient(
                    circle at 50% 35%,
                    rgba(255, 255, 255, 0.045),
                    transparent 38%
                ),
                #050505;
            color: #f5f5f5;
            font-family:
                Inter,
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Helvetica,
                Arial,
                sans-serif;
        }

        main {
            width: 100%;
            max-width: 920px;
            text-align: center;
        }

        .mark {
            width: 74px;
            height: 74px;
            margin: 0 auto 34px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 4px;
            transform: rotate(45deg);
        }

        .mark span {
            display: block;
            border-radius: 3px;
            background: #f5f5f5;
        }

        .mark span:nth-child(1),
        .mark span:nth-child(3),
        .mark span:nth-child(7),
        .mark span:nth-child(9) {
            opacity: 0.18;
        }

        .mark span:nth-child(2),
        .mark span:nth-child(4),
        .mark span:nth-child(6),
        .mark span:nth-child(8) {
            opacity: 0.48;
        }

        .mark span:nth-child(5) {
            opacity: 1;
        }

        h1 {
            margin: 0;
            font-size: clamp(3.25rem, 9vw, 6.8rem);
            line-height: 0.95;
            font-weight: 650;
            letter-spacing: -0.065em;
        }

        .category {
            margin: 30px 0 0;
            font-size: clamp(1rem, 2.2vw, 1.35rem);
            line-height: 1.5;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #d5d5d5;
        }

        .statement {
            max-width: 720px;
            margin: 28px auto 0;
            font-size: clamp(1.25rem, 3vw, 2rem);
            line-height: 1.45;
            font-weight: 300;
            color: #a9a9a9;
        }

        .status {
            margin: 54px 0 0;
            font-size: 0.84rem;
            line-height: 1.6;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #6f6f6f;
        }

        footer {
            margin-top: 76px;
            font-size: 0.8rem;
            color: #555;
        }

        @media (max-width: 560px) {
            body {
                padding: 32px 20px;
            }

            .mark {
                width: 58px;
                height: 58px;
                margin-bottom: 28px;
            }

            .category {
                letter-spacing: 0.1em;
            }

            .status {
                margin-top: 42px;
            }

            footer {
                margin-top: 58px;
            }
        }
    </style>
</head>

<body>
    <main>
        <div class="mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <h1>InFovea</h1>

        <p class="category">
            Governed Cognitive Infrastructure
        </p>

        <p class="statement">
            Improving the quality of professionally accountable decisions.
        </p>

        <p class="status">
            Our website is currently being updated.
        </p>

        <footer>
            &copy; 2026 InFovea. All rights reserved.
        </footer>
    </main>
</body>
</html>

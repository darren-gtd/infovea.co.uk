<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>InFovea | Governed Cognitive Infrastructure</title>

    <meta
        name="description"
        content="InFovea is a Governed Cognitive Infrastructure platform designed to improve the quality of professionally accountable decisions."
    >

    <meta name="theme-color" content="#050505">

    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link
        rel="icon"
        type="image/png"
        sizes="32x32"
        href="favicon-32x32.png"
    >

    <link
        rel="icon"
        type="image/png"
        sizes="16x16"
        href="favicon-16x16.png"
    >

    <link
        rel="apple-touch-icon"
        sizes="180x180"
        href="apple-touch-icon.png"
    >

    <link rel="manifest" href="site.webmanifest">

    <style>
        :root {
            color-scheme: dark;

            --background: #050505;
            --foreground: #f5f5f3;
            --muted: #aaa9a5;
            --subtle: #686864;
            --line: rgba(255, 255, 255, 0.09);
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: var(--background);
        }

        body {
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 42px 24px;

            background:
                radial-gradient(
                    circle at 50% 37%,
                    rgba(255, 255, 255, 0.055),
                    transparent 29%
                ),
                radial-gradient(
                    circle at 44% 34%,
                    rgba(48, 144, 201, 0.045),
                    transparent 23%
                ),
                radial-gradient(
                    circle at 56% 37%,
                    rgba(91, 199, 84, 0.032),
                    transparent 24%
                ),
                radial-gradient(
                    circle at 52% 31%,
                    rgba(247, 91, 116, 0.022),
                    transparent 19%
                ),
                var(--background);

            color: var(--foreground);

            font-family:
                Inter,
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Helvetica,
                Arial,
                sans-serif;

            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        main {
            width: 100%;
            max-width: 980px;
            text-align: center;

            animation: reveal 900ms ease-out both;
        }

        .logo {
            width: clamp(106px, 11vw, 142px);
            height: auto;
            display: block;

            margin: 0 auto 22px;

            filter:
                drop-shadow(0 14px 26px rgba(0, 0, 0, 0.32))
                drop-shadow(0 0 20px rgba(255, 255, 255, 0.035));
        }

        h1 {
            margin: 0;

            font-size: clamp(4rem, 10vw, 7.4rem);
            font-weight: 650;
            line-height: 0.92;
            letter-spacing: -0.07em;
        }

        .category {
            margin: 34px 0 0;

            font-size: clamp(0.9rem, 2vw, 1.24rem);
            font-weight: 550;
            line-height: 1.5;

            letter-spacing: 0.18em;
            text-transform: uppercase;

            color: #dededb;
        }

        .statement {
            max-width: 790px;
            margin: 30px auto 0;

            font-size: clamp(1.3rem, 3vw, 2.12rem);
            font-weight: 300;
            line-height: 1.46;

            color: var(--muted);
        }

        .divider {
            width: 48px;
            height: 1px;

            margin: 50px auto 0;

            border: 0;
            background: var(--line);
        }

        .positioning {
            margin: 27px 0 0;

            font-size: 0.76rem;
            font-weight: 500;
            line-height: 1.6;

            letter-spacing: 0.17em;
            text-transform: uppercase;

            color: var(--subtle);
        }

        footer {
            margin-top: 68px;

            font-size: 0.76rem;
            line-height: 1.6;

            color: #4f4f4c;
        }

        @keyframes reveal {
            from {
                opacity: 0;
                transform: translateY(9px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            main {
                animation: none;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 34px 20px;
            }

            .logo {
                margin-bottom: 20px;
            }

            .category {
                margin-top: 28px;
                letter-spacing: 0.12em;
            }

            .statement {
                margin-top: 24px;
            }

            .divider {
                margin-top: 40px;
            }

            footer {
                margin-top: 54px;
            }
        }
    </style>
</head>

<body>
    <main>
        <img
            class="logo"
            src="infovea-symbol.svg"
            alt="InFovea"
            width="142"
            height="142"
        >

        <h1>InFovea</h1>

        <p class="category">
            Governed Cognitive Infrastructure
        </p>

        <p class="statement">
            Improving the quality of professionally accountable decisions.
        </p>

        <hr class="divider">

        <p class="positioning">
            A new category of professional technology
        </p>

        <footer>
            &copy; 2026 InFovea
        </footer>
    </main>
</body>
</html>
